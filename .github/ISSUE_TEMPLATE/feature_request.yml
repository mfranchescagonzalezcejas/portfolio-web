name: Feature request
description: Suggest a focused portfolio or product improvement.
title: "feat: "
labels:
  - type:feature
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I understand a maintainer must add `status:approved` before a PR can be opened.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user, maintainer, or reviewer need does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful outcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Website UI/content
        - Accessibility
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Mention workarounds or other designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Add examples, screenshots, links, or constraints.
