name: Maintenance task
description: Request a focused CI, dependency, repository metadata, or release-process update.
title: "chore: "
labels:
  - type:chore
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I understand a maintainer must add `status:approved` before a PR can be opened.
          required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What maintenance work is needed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - CI/workflows
        - Dependencies
        - Repository metadata
        - Release process
        - Other
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: Describe the smallest useful result.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional. Add links, examples, or constraints.
